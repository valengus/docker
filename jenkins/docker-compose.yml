version: "3"

services:

  jenkins-master:
    container_name: jenkins-master
    image: local/jenkins:2.452.3
    restart: unless-stopped
    ports:
    - 8080:8080
    environment:
    - JENKINS_ADMIN_USER=admin
    - JENKINS_ADMIN_PASS=password
    volumes:
    - ./jenkins-config-as-code.yaml:/var/lib/jenkins/jenkins-config-as-code.yaml
